name: alerts
description: Balagh Amen - Professional Alert Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # État global
  provider: ^6.1.1

  # Préférences locales
  shared_preferences: ^2.2.2

  # Firebase packages
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4

  # Database
  sqflite: ^2.4.0
  path_provider: ^2.1.5
  path: ^1.9.0

  # Location & Maps - FLUTTER MAP (OpenStreetMap)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Image picker
  image_picker: ^1.1.2
  
  # File picker
  file_picker: ^8.0.3

  # Utilities
  url_launcher: ^6.3.1

  # Crypto pour hashing
  crypto: ^3.0.3

  # Location
  geolocator: ^13.0.2

  # ✅ Intl pour les dates
  intl: ^0.20.2
  
  # Open file
  open_filex: ^4.5.0

  # UI Preview
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

# ✅ CONFIGURATION DES ICÔNES
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icone.png" # Corrigé pour pointer vers le fichier existant
  adaptive_icon_background: "#D32F2F"
  adaptive_icon_foreground: "assets/icone.png"

# ✅ CONFIGURATION FLUTTER
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/images/
